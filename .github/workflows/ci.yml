name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Install optional adapter dependencies
        # Flask powers the REST API tests; pydantic powers the LangChain
        # schema tests. We deliberately do NOT install mcp / openai /
        # langchain themselves — the Phase 3 test suite verifies the
        # adapters can be loaded and exercised without them via subprocess.
        # langchain_tools.py also has a runtime fallback for the case when
        # pydantic is absent, but installing it here lets the schema tests
        # actually run rather than skip.
        run: |
          pip install flask pydantic

      - name: Run core regression suite (verify/)
        run: |
          python -m pytest verify/ -v --tb=short
        env:
          PYTHONIOENCODING: utf-8

      - name: Run Skill tests - protocol-decode (AXI4)
        run: |
          python verify/test_protocol_decode_axi4.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Run Skill tests - fsm-trace
        run: |
          python verify/test_fsm_trace.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Run Skill tests - causality
        run: |
          python verify/test_causality.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Run Skill tests - anomaly-detect
        run: |
          python verify/test_anomaly_detect.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Run Skill tests - protocol-decode (APB/UART/SPI)
        run: |
          python verify/test_protocol_decoders.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Run Skill tests - envelope / manifest / error
        run: |
          python verify/test_skill_envelope.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Run Agent adapter tests (MCP / OpenAI / LangChain / REST)
        run: |
          python verify/test_integrations.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Verify CLI help works
        run: |
          python vcd_analyzer.py --help
          python vcd_analyzer.py info --help
          python vcd_analyzer.py list --help
          python vcd_analyzer.py dump --help
          python vcd_analyzer.py summary --help
          python vcd_analyzer.py snapshot --help
          python vcd_analyzer.py compare --help
          python vcd_analyzer.py search --help
          python vcd_analyzer.py protocol-decode --help
          python vcd_analyzer.py fsm-trace --help
          python vcd_analyzer.py causality --help
          python vcd_analyzer.py anomaly-detect --help

      - name: Verify Skill manifest commands work
        run: |
          python vcd_analyzer.py --skill-manifest > /dev/null
          # Basic queries (Phase 3.5)
          python vcd_analyzer.py --skill-info info > /dev/null
          python vcd_analyzer.py --skill-info list > /dev/null
          python vcd_analyzer.py --skill-info dump > /dev/null
          python vcd_analyzer.py --skill-info summary > /dev/null
          python vcd_analyzer.py --skill-info snapshot > /dev/null
          python vcd_analyzer.py --skill-info compare > /dev/null
          python vcd_analyzer.py --skill-info search > /dev/null
          # Advanced Skills (Phase 1)
          python vcd_analyzer.py --skill-info protocol_decode > /dev/null
          python vcd_analyzer.py --skill-info fsm_trace > /dev/null
          python vcd_analyzer.py --skill-info causality > /dev/null
          python vcd_analyzer.py --skill-info anomaly_detect > /dev/null
        shell: bash

  lint:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check Python syntax
        run: |
          python -m py_compile vcd_analyzer.py
          for f in verify/test_*.py; do
            if [ -f "$f" ]; then
              python -m py_compile "$f"
            fi
          done
          # Adapter modules — syntax only, full imports may need optional deps
          for f in vcd_integrations/mcp/_helpers.py \
                   vcd_integrations/openai/generate_functions.py \
                   vcd_integrations/openai/executor.py \
                   vcd_integrations/openai/example.py \
                   vcd_integrations/langchain_tools.py \
                   vcd_integrations/langchain_example.py \
                   vcd_integrations/rest_api/server.py; do
            if [ -f "$f" ]; then
              python -m py_compile "$f"
            fi
          done
          # MCP server.py contains a top-level sys.exit when mcp isn't installed,
          # so we check syntax only via compile (no execution).
          python -c "import py_compile; py_compile.compile('vcd_integrations/mcp/server.py', doraise=True)"

      - name: Verify OpenAI functions.json stays in sync with manifest
        run: |
          python vcd_integrations/openai/generate_functions.py > /tmp/regen.json
          diff -u vcd_integrations/openai/functions.json /tmp/regen.json
        shell: bash
